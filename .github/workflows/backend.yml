name: Backend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20

    env:
      # SQLite for CI; the app supports Postgres via DATABASE_URL in prod.
      DATABASE_URL: "sqlite:///./ci.db"
      # Ephemeral CI secret (>=32 chars); never a real key.
      JWT_SECRET: "ci_jwt_secret_at_least_thirty_two_chars_long_xx"

    steps:
      - uses: actions/checkout@v4
      - name: runner-lint (hosted runners are billing-locked)
        run: bash "$GITHUB_WORKSPACE/.github/lint/lint-runner-labels.sh" "$GITHUB_WORKSPACE/.github/workflows"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: streamura/backend/requirements.txt

      - name: Install dependencies
        working-directory: streamura/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: streamura/backend
        # PYTHONPATH mirrors start.sh: parent (for `backend.x` imports) + backend/ (for bare imports)
        # Full suite — all 516 tests pass (test_streaming + test_hitl reconciled).
        run: |
          export PYTHONPATH="$(cd .. && pwd):$(pwd)"
          python -m pytest tests/ -q
