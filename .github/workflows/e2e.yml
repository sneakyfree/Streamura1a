name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: [self-hosted, linux, x64]
    # 40 min: the shared Kit 0 box is sometimes heavily loaded and npm ci +
    # browser download + build can legitimately take a while.
    timeout-minutes: 40
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: streamura/frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: streamura/frontend
        run: npm ci
      
      - name: Install Chromium OS dependencies
        # `playwright install --with-deps` shells out via `sudo sh -c ...`,
        # which the runner's sudoers (passwordless for apt-get ONLY) rejects
        # ("sudo: a terminal is required to read the password"). Install the
        # Ubuntu 24.04 chromium dependency set with plain apt-get instead.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libatspi2.0-0t64 \
            libcairo2 libcups2t64 libdbus-1-3 libdrm2 libgbm1 libglib2.0-0t64 \
            libnspr4 libnss3 libpango-1.0-0 libx11-6 libxcb1 libxcomposite1 \
            libxdamage1 libxext6 libxfixes3 libxkbcommon0 libxrandr2 \
            fonts-liberation fonts-noto-color-emoji

      - name: Install Playwright browsers
        working-directory: streamura/frontend
        run: npx playwright install chromium

      - name: Pick a free port for the dev server
        # The box runs resident containers; a fixed port can collide with (or
        # silently point tests at) a foreign service. Bind port 0 to get a
        # genuinely free ephemeral port and hand it to playwright.config.ts.
        run: |
          echo "PLAYWRIGHT_PORT=$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1])')" >> "$GITHUB_ENV"

      - name: Build frontend
        working-directory: streamura/frontend
        run: npm run build
      
      - name: Run E2E tests
        working-directory: streamura/frontend
        run: npm run test:e2e
        env:
          CI: true

      # NOTE: the playwright-report / test-results upload-artifact steps were
      # removed for now: GitHub artifact storage is billing-blocked
      # account-wide, so any actions/upload-artifact call fails with
      # "Artifact storage quota has been hit". Failure details remain in the
      # job log (list reporter + trace on retry). Restore the uploads once
      # billing is unblocked.
