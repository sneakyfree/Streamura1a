name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: streamura/frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: streamura/frontend
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: streamura/frontend
        run: npx playwright install --with-deps chromium
      
      - name: Build frontend
        working-directory: streamura/frontend
        run: npm run build
      
      - name: Run E2E tests
        working-directory: streamura/frontend
        run: npm run test:e2e
        env:
          CI: true
      
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: streamura/frontend/playwright-report/
          retention-days: 7
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: streamura/frontend/test-results/
          retention-days: 7
