version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: streamura-postgres
    environment:
      POSTGRES_USER: streamura
      POSTGRES_PASSWORD: streamura_dev
      POSTGRES_DB: streamura
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamura"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: streamura-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # LiveKit Server for WebRTC streaming
  livekit:
    image: livekit/livekit-server:latest
    container_name: streamura-livekit
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"  # HTTP API
      - "7881:7881"  # RTC over TCP
      - "7882:7882/udp"  # RTC over UDP
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: streamura-backend
    environment:
      DATABASE_URL: postgresql://streamura:streamura_dev@postgres:5432/streamura
      REDIS_URL: redis://redis:6379
      LIVEKIT_URL: http://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret_dev_key_do_not_use_in_production
      JWT_SECRET: dev_jwt_secret_change_in_production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend Dev Server (optional - can run separately)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: streamura-frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_LIVEKIT_URL: ws://localhost:7880
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
